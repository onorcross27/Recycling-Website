<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Recycling Locator</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css?fix=1" />
  </head>
  <body>
    <div id="controls">
      <div>
        <label for="material">Material</label>
        <input id="material" list="materials" placeholder="e.g. glass, batteries" />
        <datalist id="materials">
          <option value="glass"></option>
          <option value="paper"></option>
          <option value="plastic"></option>
          <option value="metal"></option>
          <option value="electronics"></option>
          <option value="batteries"></option>
          <option value="textiles"></option>
          <option value="cardboard"></option>
          <option value="tyres"></option>
        </datalist>
      </div>
      <div>
        <label for="radius">Radius (mi)</label>
        <input id="radius" type="number" value="12.5" min="0.1" max="200" step="0.1" />
        <div id="radius-help" style="font-size:12px;color:#444;margin-top:4px">~20.1 km</div>
      </div>
      <button id="find">Find nearby recycling</button>
      <div id="status" class="status">Determining your location…</div>
      <pre id="errorDump" class="error-dump" style="display:none"></pre>
    </div>
    <div id="map"></div>
    <div id="loading" style="display:none">Searching…</div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js?fix=1"></script>
  </body>
</html>
